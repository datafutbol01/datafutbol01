name: Cron H2H Auto-Updater

on:
  schedule:
    # 11:00 UTC corresponde a las 08:00 AM hora de Argentina (UTC-3)
    # Se ejecuta los Lunes (1), Miércoles (3) y Viernes (5)
    - cron: '0 11 * * 1,3,5'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

permissions:
  contents: write # Necesario para poder hacer el commit y push automático

jobs:
  update-h2h:
    runs-on: ubuntu-latest
    
    steps:
      - name: Chequear repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Usa node 20 que incluye fetch nativo

      - name: Ejecutar Bot de Actualización H2H
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_APIKEY: ${{ secrets.WHATSAPP_APIKEY }}
        run: node scripts_inyeccion/bot_h2h_cron.mjs

      - name: Verificar cambios y autoguardar (Commit & Push)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Verificar si hay cambios en los JSON
          if [[ -n "$(git status --porcelain app/src/data/ligas/)" ]]; then
            git add app/src/data/ligas/*.json
            git commit -m "🤖 Auto-update: Historiales H2H actualizados automáticamente"
            git push
            echo "Cambios subidos a GitHub."
          else
            echo "No se detectaron cambios en la base de datos."
          fi
