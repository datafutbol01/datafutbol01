<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" font-family="Arial, sans-serif">

  <rect width="900" height="320" fill="#f5f5f5"/>
  <text x="450" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#333">CLUB ATLÉTICO LANÚS — Evolución del Escudo</text>

  <!-- ====== 1: 1915 - Óvalo blanco CAL ====== -->
  <g transform="translate(20, 50)">
    <ellipse cx="70" cy="90" rx="60" ry="75" fill="white" stroke="#8B0000" stroke-width="4"/>
    <text x="70" y="75" text-anchor="middle" font-size="20" font-weight="bold" fill="#8B0000">C</text>
    <text x="70" y="100" text-anchor="middle" font-size="20" font-weight="bold" fill="#8B0000">A</text>
    <text x="70" y="125" text-anchor="middle" font-size="20" font-weight="bold" fill="#8B0000">L</text>
    <text x="70" y="230" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">1915 – 1950</text>
    <text x="70" y="248" text-anchor="middle" font-size="10" fill="#666">Óvalo blanco</text>
    <text x="70" y="262" text-anchor="middle" font-size="10" fill="#666">iniciales CAL granate</text>
  </g>

  <text x="148" y="148" font-size="24" fill="#999">→</text>

  <!-- ====== 2: 1950 - Óvalo granate ====== -->
  <g transform="translate(168, 50)">
    <ellipse cx="70" cy="90" rx="60" ry="75" fill="#8B0000" stroke="#333" stroke-width="2"/>
    <text x="70" y="75" text-anchor="middle" font-size="22" font-weight="bold" fill="white">C</text>
    <text x="70" y="100" text-anchor="middle" font-size="22" font-weight="bold" fill="white">A</text>
    <text x="70" y="125" text-anchor="middle" font-size="22" font-weight="bold" fill="white">L</text>
    <text x="70" y="230" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">1950 – 1951</text>
    <text x="70" y="248" text-anchor="middle" font-size="10" fill="#666">Fondo granate</text>
    <text x="70" y="262" text-anchor="middle" font-size="10" fill="#666">letras blancas</text>
  </g>

  <text x="298" y="148" font-size="24" fill="#999">→</text>

  <!-- ====== 3: 1951 - Con banderín ====== -->
  <g transform="translate(318, 50)">
    <!-- Banderín exterior -->
    <ellipse cx="70" cy="90" rx="68" ry="82" fill="white" stroke="#8B0000" stroke-width="2"/>
    <ellipse cx="70" cy="90" rx="56" ry="70" fill="#8B0000" stroke="none"/>
    <!-- Estrella arriba -->
    <text x="70" y="32" text-anchor="middle" font-size="13" fill="#8B0000">★</text>
    <text x="70" y="72" text-anchor="middle" font-size="22" font-weight="bold" fill="white">C</text>
    <text x="70" y="96" text-anchor="middle" font-size="22" font-weight="bold" fill="white">A</text>
    <text x="70" y="120" text-anchor="middle" font-size="22" font-weight="bold" fill="white">L</text>
    <text x="70" y="230" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">1951 – 1977</text>
    <text x="70" y="248" text-anchor="middle" font-size="10" fill="#666">Banderín blanco</text>
    <text x="70" y="262" text-anchor="middle" font-size="10" fill="#666">+ 1ª estrella (1945)</text>
  </g>

  <text x="448" y="148" font-size="24" fill="#999">→</text>

  <!-- ====== 4: 1977 - Circular ====== -->
  <g transform="translate(468, 50)">
    <circle cx="70" cy="90" r="72" fill="white" stroke="#8B0000" stroke-width="4"/>
    <circle cx="70" cy="90" r="60" fill="#8B0000" stroke="none"/>
    <!-- Estrellas -->
    <text x="70" y="38" text-anchor="middle" font-size="11" fill="#8B0000">★ ★ ★</text>
    <text x="70" y="72" text-anchor="middle" font-size="22" font-weight="bold" fill="white">C</text>
    <text x="70" y="96" text-anchor="middle" font-size="22" font-weight="bold" fill="white">A</text>
    <text x="70" y="120" text-anchor="middle" font-size="22" font-weight="bold" fill="white">L</text>
    <text x="70" y="230" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">1977 – 1997</text>
    <text x="70" y="248" text-anchor="middle" font-size="10" fill="#666">Forma circular</text>
    <text x="70" y="262" text-anchor="middle" font-size="10" fill="#666">3 estrellas</text>
  </g>

  <text x="598" y="148" font-size="24" fill="#999">→</text>

  <!-- ====== 5: 1997-actual ====== -->
  <g transform="translate(618, 50)">
    <!-- Escudo heráldico moderno -->
    <path d="M10,10 L130,10 L130,130 L70,175 L10,130 Z" fill="white" stroke="#8B0000" stroke-width="3"/>
    <path d="M18,18 L122,18 L122,127 L70,165 L18,127 Z" fill="#8B0000" stroke="none"/>
    <!-- Estrellas arriba -->
    <text x="70" y="8" text-anchor="middle" font-size="10" fill="#8B0000">★ ★ ★ ★</text>
    <!-- CAL entrelazadas -->
    <text x="55" y="85" text-anchor="middle" font-size="28" font-weight="bold" fill="white">C</text>
    <text x="70" y="105" text-anchor="middle" font-size="28" font-weight="bold" fill="white">A</text>
    <text x="88" y="125" text-anchor="middle" font-size="28" font-weight="bold" fill="white">L</text>
    <text x="70" y="230" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">1997 →</text>
    <text x="70" y="248" text-anchor="middle" font-size="10" fill="#666">Escudo heráldico</text>
    <text x="70" y="262" text-anchor="middle" font-size="10" fill="#666">CAL entrelazadas</text>
  </g>

</svg>
